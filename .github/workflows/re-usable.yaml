name: Reusable Workflow
on:
  workflow_call:
    inputs:
      name:
        description: 'Enter your name'
        required: true
        type: string
jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting Step
        run: echo "Hi ${{ inputs.name }}! Welcome to the reusable workflow!"



